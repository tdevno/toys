<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絶妖星乱舞p4デバフ計算</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif; background: #111; color: #e8e8e8; padding: 1.5rem 1rem; min-height: 100vh; }

  .title-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  h1 { font-size: 18px; font-weight: 500; color: #e8e8e8; }
  .reset-btn { font-size: 12px; padding: 4px 12px; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.25); background: transparent; color: #aaa; cursor: pointer; }
  .reset-btn:hover { background: rgba(255,255,255,0.08); color: #e8e8e8; }

  .section { background: #1c1c1c; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .sec-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.875rem; }
  .sec-title { font-size: 15px; font-weight: 500; color: #e8e8e8; }

  /* 本当/嘘トグル */
  .truth-toggle { display: flex; border-radius: 6px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.15); }
  .tt-btn { font-size: 11px; padding: 3px 10px; background: transparent; color: #888; border: none; cursor: pointer; transition: background 0.1s, color 0.1s; }
  .tt-btn:hover { color: #ccc; }
  .tt-btn.tt-true.active  { background: #1D9E75; color: #fff; }
  .tt-btn.tt-false.active { background: #E24B4A; color: #fff; }
  .tt-divider-v { width: 0.5px; background: rgba(255,255,255,0.15); }

  /* ギミックグリッド（アイコン＋ボタン） */
  .gimmick-row { display: flex; flex-wrap: wrap; gap: 20px; }
  .gimmick-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .gimmick-icon { width: 40px; height: 40px; object-fit: contain; }
  .gimmick-label { font-size: 11px; color: #aaa; text-align: center; }
  .gimmick-btns { display: flex; gap: 4px; }

  /* 早遅ボタン */
  .vb {
    font-size: 15px; padding: 7px 13px; border-radius: 8px;
    border: 0.5px solid rgba(255,255,255,0.2);
    background: transparent; color: #ccc; cursor: pointer;
    white-space: nowrap; transition: background 0.1s, border-color 0.1s, color 0.1s;
    min-width: 47px; text-align: center;
  }
  .vb:hover { background: rgba(255,255,255,0.08); }
  .vb.active-true  { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .vb.active-false { background: #E24B4A; border-color: #E24B4A; color: #fff; }

  /* GC3・マジックチャージ用（排他トグル） */
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }

  /* 集計 */
  .summary { background: #1c1c1c; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem 1.25rem; }
  .sum-title { font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; color: #e8e8e8; }
  .sum-row { margin-bottom: 8px; font-size: 14px; color: #e8e8e8; line-height: 1.6; }
  .sum-row .lbl { font-weight: 500; color: #aaa; margin-right: 4px; }
  .sum-empty { font-size: 13px; color: #666; }
</style>
</head>

function resolveName(raw, isTrue) {
  if (raw === '頭割り')      return isTrue ? '頭割り'              : 'ライトニング';
  if (raw === 'ライトニング') return isTrue ? 'ライトニング'        : '頭割り';
  if (raw === '加速度爆弾')  return isTrue ? '加速度爆弾（動かない）' : '加速度爆弾（動く）';
  if (raw === '視線')        return isTrue ? '視線（見ない）'       : '視線（見る）';
  if (raw === 'ほのお')      return isTrue ? 'たけのこAoE'          : 'たけのこドーナツ';
  if (raw === 'つなみ')      return isTrue ? 'たけのこドーナツ'     : 'たけのこAoE';
  return raw;
}

const SORT_ORDER = [
  '頭割り','ライトニング',
  '加速度爆弾（動く）','加速度爆弾（動かない）',
  '視線（見る）','視線（見ない）',
  'たけのこAoE','たけのこドーナツ'
];
function sortByPriority(arr) {
  return [...arr].sort((a,b) => {
    const ia = SORT_ORDER.indexOf(a), ib = SORT_ORDER.indexOf(b);
    return (ia===-1?999:ia)-(ib===-1?999:ib);
  });
}

function buildUI() {
  const app = document.getElementById('app');

  SECS.forEach(s => {
    const sec = document.createElement('div');
    sec.className = 'section';

    // ヘッダー
    const header = document.createElement('div');
    header.className = 'sec-header';
    const titleEl = document.createElement('div');
    titleEl.className = 'sec-title';
    titleEl.textContent = s.title;
    header.appendChild(titleEl);

    if (s.type === 'gc' || s.type === 'ht') {
      const toggle = document.createElement('div');
      toggle.className = 'truth-toggle';
      const btnT = document.createElement('button');
      btnT.className = 'tt-btn tt-true active';
      btnT.textContent = '本当';
      const div = document.createElement('div');
      div.className = 'tt-divider-v';
      const btnF = document.createElement('button');
      btnF.className = 'tt-btn tt-false';
      btnF.textContent = '嘘';

      btnT.onclick = () => { setTruth(s.id, !secTruth[s.id], btnT, btnF, s); };
      btnF.onclick = () => { setTruth(s.id, !secTruth[s.id], btnT, btnF, s); };

      toggle.appendChild(btnT);
      toggle.appendChild(div);
      toggle.appendChild(btnF);
      header.appendChild(toggle);
      s._btnTrue = btnT;
      s._btnFalse = btnF;
    }

    sec.appendChild(header);

    // ボタン本体
    if (s.type === 'gc' || s.type === 'ht') {
      const row = document.createElement('div');
      row.className = 'gimmick-row';

      s.gimmicks.forEach(g => {
        const item = document.createElement('div');
        item.className = 'gimmick-item';

        const icon = document.createElement('img');
        icon.className = 'gimmick-icon';
        icon.src = IMGS[g.img];
        icon.alt = g.label;
        item.appendChild(icon);

        const lbl = document.createElement('div');
        lbl.className = 'gimmick-label';
        lbl.textContent = g.label;
        item.appendChild(lbl);

        const btns = document.createElement('div');
        btns.className = 'gimmick-btns';

        g.timings.forEach(timing => {
          const k = `${s.id}_${g.key}_${timing}`;
          const btn = document.createElement('button');
          btn.className = 'vb';
          btn.textContent = timing;
          btn.addEventListener('click', () => {
            const wasOn = !!active[k];
            const isTrue = secTruth[s.id];
            // 同じギミックの他のタイミングボタンを消灯
            g.timings.forEach(t => {
              const ok = `${s.id}_${g.key}_${t}`;
              active[ok] = false;
              if (btnMap[ok]) btnMap[ok].el.classList.remove('active-true','active-false');
            });
            // 押したボタンをトグル
            if (!wasOn) {
              active[k] = true;
              btn.classList.add(isTrue ? 'active-true' : 'active-false');
            }
            updateSummary();
          });
          btnMap[k] = { el: btn, secId: s.id, base: g.key, timing, type: s.type };
          btns.appendChild(btn);
        });

        item.appendChild(btns);
        row.appendChild(item);
      });
      sec.appendChild(row);

    } else if (s.type === 'gc3') {
      const row = document.createElement('div');
      row.className = 'gimmick-row';

      GC3_BTNS.forEach(g => {
        const item = document.createElement('div');
        item.className = 'gimmick-item';

        // アイコン（blue/purple と allagan/choetsu を横並びで2枚表示）
        const iconWrap = document.createElement('div');
        iconWrap.style.cssText = 'display:flex;gap:4px;align-items:center;';
        const colorIcon = document.createElement('img');
        colorIcon.className = 'gimmick-icon';
        colorIcon.src = IMGS[g.color];
        const typeIcon = document.createElement('img');
        typeIcon.className = 'gimmick-icon';
        typeIcon.src = IMGS[g.img];
        iconWrap.appendChild(colorIcon);
        iconWrap.appendChild(typeIcon);
        item.appendChild(iconWrap);

        const lbl = document.createElement('div');
        lbl.className = 'gimmick-label';
        lbl.textContent = g.label;
        item.appendChild(lbl);

        const k = `gc3_${g.key}`;
        const btn = document.createElement('button');
        btn.className = 'vb';
        btn.textContent = '選択';
        btn.addEventListener('click', () => {
          const wasOn = !!active[k];
          // 排他
          GC3_BTNS.forEach(gg => {
            const kk = `gc3_${gg.key}`;
            active[kk] = false;
            if (btnMap[kk]) btnMap[kk].el.classList.remove('active-true','active-false');
          });
          if (!wasOn) {
            active[k] = true;
            btn.classList.add('active-true');
          }
          updateSummary();
        });
        btnMap[k] = { el: btn, secId: 'gc3', raw: g.label, type: 'gc3' };

        const btns = document.createElement('div');
        btns.className = 'gimmick-btns';
        btns.appendChild(btn);
        item.appendChild(btns);
        row.appendChild(item);
      });
      sec.appendChild(row);

    } else if (s.type === 'mc') {
      const row = document.createElement('div');
      row.className = 'btn-row';
      MC_BTNS.forEach((label, i) => {
        const k = `mc_${i}`;
        const btn = document.createElement('button');
        btn.className = 'vb';
        btn.textContent = label;
        btn.addEventListener('click', () => {
          const wasOn = !!active[k];
          MC_BTNS.forEach((_, j) => {
            active[`mc_${j}`] = false;
            if (btnMap[`mc_${j}`]) btnMap[`mc_${j}`].el.classList.remove('active-true','active-false');
          });
          if (!wasOn) { active[k] = true; btn.classList.add('active-true'); }
          updateSummary();
        });
        btnMap[k] = { el: btn, secId: 'mc', raw: label, type: 'mc' };
        row.appendChild(btn);
      });
      sec.appendChild(row);
    }

    app.appendChild(sec);
  });

  const sumEl = document.createElement('div');
  sumEl.className = 'summary';
  sumEl.id = 'summary';
  app.appendChild(sumEl);
  updateSummary();
}

function setTruth(secId, isTrue, btnT, btnF, s) {
  secTruth[secId] = isTrue;
  btnT.classList.toggle('active', isTrue);
  btnF.classList.toggle('active', !isTrue);
  // アクティブボタンの色を更新
  Object.entries(btnMap).forEach(([k, info]) => {
    if (info.secId !== secId || !active[k]) return;
    info.el.classList.remove('active-true','active-false');
    info.el.classList.add(isTrue ? 'active-true' : 'active-false');
  });
  updateSummary();
}

function updateSummary() {
  const earlySet = new Set();
  const lateSet  = new Set();
  const gc3List  = [];
  const mcList   = [];

  Object.entries(btnMap).forEach(([k, info]) => {
    if (!active[k]) return;
    const { secId, type, raw } = info;

    if (type === 'gc3') {
      const gc3Map = {
        '青アラガン': '紫に当たる（ビームが嘘なら逆の色）',
        '青超越':     '青に当たる（ビームが嘘なら逆の色）',
        '紫アラガン': '青に当たる（ビームが嘘なら逆の色）',
        '紫超越':     '紫に当たる（ビームが嘘なら逆の色）',
      };
      gc3List.push(gc3Map[raw] || raw);
      return;
    }
    if (type === 'mc') { mcList.push(raw); return; }

    // gc / ht
    const isTrue = secTruth[secId];
    const base = info.base;
    const gimmickLabel = (() => {
      if (base === 'atamawari') return '頭割り';
      if (base === 'lightning') return 'ライトニング';
      if (base === 'kasokudo')  return '加速度爆弾';
      if (base === 'shisen')    return '視線';
      if (base === 'honoo')     return 'ほのお';
      if (base === 'tsunami')   return 'つなみ';
      return base;
    })();
    const name = resolveName(gimmickLabel, isTrue);
    if (info.timing === '早') earlySet.add(name);
    if (info.timing === '遅') lateSet.add(name);
  });

  let html = '<div class="sum-title">集計結果</div>';
  const hasAny = earlySet.size > 0 || lateSet.size > 0 || gc3List.length > 0 || mcList.length > 0;

  if (!hasAny) {
    html += '<div class="sum-empty">ボタンを押すと集計が表示されます</div>';
  } else {
    if (earlySet.size > 0)
      html += `<div class="sum-row"><span class="lbl">早：</span>${sortByPriority([...earlySet]).join('、')}</div>`;
    if (lateSet.size > 0)
      html += `<div class="sum-row"><span class="lbl">遅：</span>${sortByPriority([...lateSet]).join('、')}</div>`;
    if (gc3List.length > 0) {
      const gc3Html = gc3List.map(item => {
        if (item.startsWith('青')) return `<span style="color:#7EC8E3">${item}</span>`;
        if (item.startsWith('紫')) return `<span style="color:#C9A9E8">${item}</span>`;
        return item;
      }).join('、');
      html += `<div class="sum-row"><span class="lbl">GC3：</span>${gc3Html}</div>`;
    }
    if (mcList.length > 0)
      html += `<div class="sum-row"><span class="lbl">マジックチャージ：</span>${mcList.join('、')}</div>`;
  }

  document.getElementById('summary').innerHTML = html;
}

function resetAll() {
  Object.keys(active).forEach(k => {
    active[k] = false;
    if (btnMap[k]) btnMap[k].el.classList.remove('active-true','active-false');
  });
  SECS.forEach(s => {
    if (s._btnTrue)  { s._btnTrue.classList.add('active'); secTruth[s.id] = true; }
    if (s._btnFalse) s._btnFalse.classList.remove('active');
  });
  updateSummary();
}

buildUI();
</script>
</body>
</html>
